    { id: "d51", date: "23/04/2025", name: "So Close Yet So Far 🛵", description: "" },
    { id: "d52", date: "26/04/2025", name: "La Remontada 💙♥️", description: "Rutya had come for the weekend and El Clasico screening. We went to Prithvi Cafe — amazing food, candid conversations. Came home, played cards, taught her Show, ordered food and ate it in the cab to the screening. What a rollercoaster ride. She was very adamant on capturing me and Rutya like she was third wheeling. In the end Barca made a crazy comeback." },
    { id: "d53", date: "27/04/2025", name: "Paper Hearts 🃏💌", description: "Woke up, ordered breakfast, played more cards. Then a painful goodbye." },
    { id: "d54", date: "01/05/2025", name: "Shifting Gears 🕹️♉️", description: "" },
    { id: "d55", date: "03/05/2025", name: "The Best Behaviour 🤓", description: "" },
    { id: "d56", date: "07/05/2025", name: "The Second First Date ☕️🧋", description: "" },
    { id: "d57", date: "10/05/2025", name: "Yin and Yang 🌖🌘", description: "Went to mystery room — loads of fun trying to escape Bhangarh Fort and failing miserably. Everyone was literally a kid there. Then shopping for her chappal, Taco Bell takeaway, watched sunset from Versova. The sunset, the moon, the clouds — all amazing. Then talked about wedding planning and found middle ground." },
    { id: "d58", date: "18/05/2025", name: "The Finale 👨‍👩‍👦👨‍👩‍👧", description: "The D Day. Parents meeting for the first time. Went to Brijwasi for sweets, then to their place. Everyone talked about everything except marriage. Met Rasika and Vedu for the first time. Lunch at Utsav — chaotic service but it gave us time to talk. Went back home. Conversations finally started. We finalized our engagement date right there. Our parents met for the first time and took such a big decision. Very very surprising." },
    { id: "d59", date: "23/05/2025", name: "The Gift Shop 🎁🛍️", description: "Outfit shopping — pure and utter chaos. Saree for her, then for her mom and sister. They insisted on buying clothes for us too. Got me a kurta. Lunch at Metkut — everyone loved it. Me and baby had the thali." },
    { id: "d60", date: "30/05/2025", name: "Second Time's the Charm 🧇🍫", description: "" },
    { id: "d61", date: "31/05/2025", name: "Advice to My Younger Self 🫂🚖", description: "Woke up, ordered breakfast in. Did a little shopping for the weekend. Then everyone came — great conversations. Boys met Al, girls played cards. Picked Kammo up, started pre-boozing. Girls made us do the proposals — so not prepared but it was wholesome. Went to SBO, danced a lot. Then Gokul — bad decision." },
    { id: "d62", date: "07/06/2025", name: "The Wrong Song 🎧", description: "Went to Kolhapur for Yash's wedding and engagement shopping. Visited and finalized the hall. Got my outfit — absolutely beautiful. Stopped at Rankala on the way back and our scooty got towed by police. Crazy. Nap in separate rooms. Went to Yash's engagement and Haldi. She met everyone from that group." },
    { id: "d63", date: "08/06/2025", name: "The Makeout Call 💋", description: "My eyes opened with her kissing my forehead. The way I want to be woken up every day. She was in the kitchen helping my parents. So happy to see them bonding. Got ready, went to Yash's wedding. Danced in the baarat. Fell asleep together — so tired. Woke up, had tea, went ring shopping. 4 shops until we found what we wanted. Then back on the bus — a great make out session while my parents were on the lower berth. That's when we decided we need time just for ourselves." },
    { id: "d64", date: "14/06/2025", name: "The Mud Island 🧱", description: "Day use hotel with intention of having lots of sex — and we did. The day was so damn magical in its comfort and peace. Ordered healthy food. Edited our postcards. Shower together — and dirty water started coming out. Crazy. Then went to her makeup artist for my makeup and hair trial. Took a little walk while finding a Xerox shop. Both really sad going home without each other." },
    { id: "d65", date: "22/06/2025", name: "The Future Play 🔜", description: "She came to surprise my dad for his birthday. Brought a cake. We had a huge fight the night before but resolved it. Cut the cake — dad got emotional. Went to Phoenix Marketcity — dad was mesmerized. Urban Tadka for food. Parents wanted to buy her a dress but we ended up buying perfumes for everyone because mom had accidentally dropped and broken my perfume. She loved her perfume." },
    { id: "d66", date: "05/07/2025", name: "Richie Rich 💸", description: "" },
    { id: "d67", date: "12/07/2025", name: "Here We Go!! 📝", description: "What a dreamy day. Getting ready, pictures clicked, pooja and lots of pedhas. Chaos. Then we took our entry. Exchanged rings. I gave her flowers. Riya got on stage and changed the entire energy — recited a poem and everyone including me started crying. Then we danced. More pics. We were official. Then our favourite Ganpati Bappa mandir. Then time to say goodbye to her." },
    { id: "d68", date: "19/07/2025", name: "Dancing in Rain 🌧️🌂", description: "Went to Karjat for our anniversary. Baby was upset because she was on her periods. Had food and went on a hike — the atmosphere was so damn lit 😍. On the way back we danced in the rains. In the evening we started drinking with old songs. Then the drinks made her sick. It was terrible 🥺" },
    { id: "d69", date: "27/07/2025", name: "A Walk Down the Memory Lane 👵🏼🧓🏽", description: "Supposed to meet Shikha and Sakshi but they were late as usual. Did a little work, went to Viviana. Photo booth pictures at the Irish House. Then Sakshi came, then Shikha. Chatted and had food. Went home. Visited aunty. Came back, had dinner, went for a walk in drizzle, sat on a bus stop. Then slept." },
    { id: "d70", date: "28/07/2025", name: "High on Thai 🍛", description: "" },
    { id: "d71", date: "02/08/2025", name: "The Icecream Shop 🍦", description: "Bought her lehenga, then went to Socials — had the shittiest salad. Got ice cream to change the taste. She saw me eating ice cream and was less embarrassed about having ice cream in public because apparently I am worse 😂. Then dropped her home." },
    { id: "d72", date: "10/08/2025", name: "Quiet Dadar Lanes 🛣️🌳", description: "Went for my shopping. Finalized my Sherwani at Dulha Paksha. She insisted on paying 5k for it since it was a little over my budget. Grandmamas — amazing food: Thai curry, hummus and pita bread, pizza. Everything so damn amazing. Walked in the quiet lanes of Dadar. She insisted on dropping me. Saw some Madal che Ganpati Bappa on the way — very beautiful." },
    { id: "d73", date: "15/08/2025", name: "Mix n Match 🥙🧋", description: "Booked a room — turned out great. Had sex 2-3 times. Had food. Watched Vir Das' new standup. Went to Riya's shop — she tried lehengas for Sangeet. Loved the golden one. Rohan's favourite place for shawarma — tasty. Then their place, chatted, milkshakes. Then my place. Dad had made masale paan for us. She loved it." },
    { id: "d74", date: "16/08/2025", name: "Crossing the Roads", description: "Woke up, had breakfast. She couldn't sleep much. Mom made kurma for lunch. Went to shop for my jeans and she got her periods — I got her pads and chocolates. Had lunch. Looked at wedding photography references. Then she went home." },
    { id: "d75", date: "23/08/2025", name: "Proposal Statement 🌹🛏️", description: "She came to meet me. I had planned a proposal — her reaction was priceless. I forgot to add a question mark 😂. Sex on the rose petal bed. Ordered food from Box8. Worked for a while. Sex again — the first time in her life that she came. She decided to stay. Dance practice — finalized songs and choreographies. Went to Pop Tates, drank and danced a little. Came back and went to sleep. 10 mins later she decided we had to have sex. I surrendered in a heartbeat. Because why not!!" },
    { id: "d76", date: "27/08/2025", name: "The Jamai Treatment", description: "Went to her place for Ganesh Chaturthi. Aai had made pav bhaji, alu chya wadya, koshimbir and Ukdiche Modak — tasty af. Practiced our choreography — done with 2 songs, 3rd pending. Was thoda low on energy but she understands." },

// ============================================================
// QUIZ ENGINE
// ============================================================
function pick(arr, n = 1) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return n === 1 ? shuffled[0] : shuffled.slice(0, n);
}

function generateQuiz(data) {
  const pool = [];
  const datesWithDesc = data.dates.filter(d => d.name && d.description && d.description.length > 30);

  const descPool = pick(datesWithDesc, Math.min(datesWithDesc.length, 8));
  (Array.isArray(descPool) ? descPool : [descPool]).forEach(q => {
    if (!q) return;
    const snippet = q.description.split(".")[0].slice(0, 120) + "…";
    const distractors = pick(datesWithDesc.filter(d => d.id !== q.id), 3);
    if (!Array.isArray(distractors) || distractors.length < 3) return;
    const options = [q, ...distractors].sort(() => Math.random() - 0.5);
    pool.push({ type: "match_desc", question: "Which of our dates does this describe? " + snippet, options: options.map(o => o.name), answer: q.name });
  });

  const allNotesFlat = Object.values(data.notes).flat();
  const giftNotes = (data.notes["Gifts to Get 🎁"] || []);
  const fakeGifts = ["Silver anklet","Chocolate box","Gym membership","Blue roses","Synthetic leather bag","Scented candles","Gold bangles","Red nail polish"];
  giftNotes.forEach(g => {
    const fakes = pick(fakeGifts, 3);
    const options = [g.text, ...fakes].sort(() => Math.random() - 0.5);
    pool.push({ type: "gift", question: "Which of these is something she would actually like as a gift?", options, answer: g.text });
  });

  const fakeRules = ['"Never say sorry first"','"No talking about the past"','"Always split the bill"','"No phones during dinner"','"Sleep before 10pm"','"No discussing money"'];
  data.rules.forEach(r => {
    const fakes = pick(fakeRules, 3);
    const options = [r.text, ...fakes].sort(() => Math.random() - 0.5);
    pool.push({ type: "rules", question: "Which one of these is one of your actual Golden Rules?", options, answer: r.text });
  });

  const generalNotes = allNotesFlat.filter(n => !["gift","bracelet"].some(w => n.text.toLowerCase().includes(w)));
  const fakeNotes = ["Loves black coffee","Favourite colour is orange","Prefers silver over gold","Drinks only green tea","Hates flowers","Favourite cuisine is Italian"];
  generalNotes.forEach(n => {
    const fakes = pick(fakeNotes, 3);
    const options = [n.text, ...fakes].sort(() => Math.random() - 0.5);
    pool.push({ type: "notes", question: "Which of these is actually true about her?", options, answer: n.text });
  });

  const fakeU = ["Eating the last bite","Being too punctual","Over-complimenting","Forgetting to text goodnight","Watching ahead in a series"];
  data.unacceptable.forEach(u => {
    const fakes = pick(fakeU, 3);
    const options = [u.text, ...fakes].sort(() => Math.random() - 0.5);
    pool.push({ type: "unacceptable", question: "Which of these is on your list of Unacceptable Things?", options, answer: u.text });
  });

  if (data.songs.length >= 4) {
    const fakeSongs = ["Tum Hi Ho","Pal Pal","Kesariya","Raataan Lambiyan","Dil Diyan Gallan","Hawayein"];
    const correctSong = pick(data.songs);
    const fakes = pick(fakeSongs, 3);
    const options = [correctSong.title, ...fakes].sort(() => Math.random() - 0.5);
    pool.push({ type: "songs", question: "Which of these is one of your songs together?", options, answer: correctSong.title });
  }

  return pick(pool, Math.min(pool.length, 10));
}

function App() {

  const [quizDone, setQuizDone] = useState(false);

  const [activityFilter, setActivityFilter] = useState("pending");
  const [modal, setModal] = useState(null);
  const [showAdd, setShowAdd] = useState({});
  const [addForm, setAddForm] = useState({});

  useEffect(() => {
    const saved = LS.get("rb-data");
    setData(saved || INITIAL_DATA);
    const savedP = LS.get("rb-progress");
    if (savedP) setProgress(savedP);
  }, []);

  const save = useCallback((newData) => {
    setData(newData);
    LS.set("rb-data", newData);
  }, []);

  const saveProgress = useCallback((newP) => {
    setProgress(newP);
    LS.set("rb-progress", newP);
  }, []);

  useEffect(() => {
    if (data && !quizState) {
      setQuizState(generateQuiz(data));
      setQuizAnswers({});
      setQuizDone(false);
    }
  }, [data, quizState]);

  if (!data) return React.createElement("div", { style: { textAlign: "center", padding: "80px", color: "#aaa" } }, "Loading…");

  const today = new Date().toLocaleDateString("en-GB");
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  const showRules = dayOfYear % 3 === 0;

  const pendingActivities = [];
  Object.entries(data.activities).forEach(([cat, items]) => {
    items.filter(a => !a.done).forEach(a => pendingActivities.push({ ...a, category: cat }));
  });

  const allNotesFlatDaily = Object.values(data.notes).flat();
  const dailyNotes = allNotesFlatDaily.length > 0
    ? [allNotesFlatDaily[dayOfYear % allNotesFlatDaily.length], allNotesFlatDaily[(dayOfYear + 1) % allNotesFlatDaily.length]].filter(Boolean)
    : [];

  const toggleActivity = (cat, id) => {
    save({ ...data, activities: { ...data.activities, [cat]: data.activities[cat].map(a => a.id === id ? { ...a, done: !a.done } : a) } });
  };

  const deleteNote = (cat, id) => {
    save({ ...data, notes: { ...data.notes, [cat]: data.notes[cat].filter(n => n.id !== id) } });
  };
  const deleteItem = (collection, id) => save({ ...data, [collection]: data[collection].filter(i => i.id !== id) });
  const deleteDate = (id) => save({ ...data, dates: data.dates.filter(d => d.id !== id) });
  const deleteActivity = (cat, id) => save({ ...data, activities: { ...data.activities, [cat]: data.activities[cat].filter(a => a.id !== id) } });

  const uid = () => Math.random().toString(36).slice(2, 8);
  const addDate = () => {
    const f = addForm.date || {};
    if (!f.date || !f.name) return;
    save({ ...data, dates: [...data.dates, { id: uid(), date: f.date, name: f.name, description: f.desc || "" }] });
    setAddForm({}); setShowAdd({});
  };
  const addSong = () => {
    const f = addForm.song || {};
    if (!f.title) return;
    save({ ...data, songs: [...data.songs, { id: uid(), title: f.title }] });
    setAddForm({}); setShowAdd({});
  };
  const addNote = () => {
    const f = addForm.note || {};
    if (!f.text) return;
    const cat = f.cat || "Miscellaneous ✨";
    const existing = data.notes[cat] || [];
    save({ ...data, notes: { ...data.notes, [cat]: [...existing, { id: uid(), text: f.text }] } });
    setAddForm({}); setShowAdd({});
  };
  const addRule = () => {
    const f = addForm.rule || {};
    if (!f.text) return;
    save({ ...data, rules: [...data.rules, { id: uid(), text: f.text }] });
    setAddForm({}); setShowAdd({});

    const f = addForm.unacceptable || {};

    setAddForm({}); setShowAdd({});

  const answerQuiz = (qi, opt) => {
    if (quizAnswers[qi] !== undefined) return;
    const newA = { ...quizAnswers, [qi]: opt };
    setQuizAnswers(newA);
    if (Object.keys(newA).length === quizState.length) {
      setQuizDone(true);
      const score = quizState.filter((q, i) => newA[i] === q.answer).length;
      const streak = (progress.streak || 0) + (score === quizState.length ? 1 : 0);
      saveProgress({ ...progress, streak, totalCorrect: (progress.totalCorrect || 0) + score, lastQuiz: today });
